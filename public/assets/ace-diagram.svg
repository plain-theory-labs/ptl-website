<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="ACE method flow">
  <defs>
    <style>
      .label { font: 600 22px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #102231; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; fill: #3d4f5c; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f7c88" />
    </marker>
  </defs>

  <rect x="20" y="30" width="1160" height="240" rx="18" fill="#f6fafb" stroke="#d3dde4" />

  <g transform="translate(70 90)">
    <rect width="180" height="110" rx="14" fill="#ffffff" stroke="#d3dde4" />
    <text class="label" x="90" y="48" text-anchor="middle">Ingest</text>
    <text class="small" x="90" y="76" text-anchor="middle">scheduler + telemetry</text>
  </g>

  <g transform="translate(290 90)">
    <rect width="180" height="110" rx="14" fill="#ffffff" stroke="#d3dde4" />
    <text class="label" x="90" y="48" text-anchor="middle">Canonical</text>
    <text class="small" x="90" y="76" text-anchor="middle">job records</text>
  </g>

  <g transform="translate(510 90)">
    <rect width="180" height="110" rx="14" fill="#ffffff" stroke="#d3dde4" />
    <text class="label" x="90" y="48" text-anchor="middle">Analyze</text>
    <text class="small" x="90" y="76" text-anchor="middle">MSA core</text>
  </g>

  <g transform="translate(730 90)">
    <rect width="180" height="110" rx="14" fill="#ffffff" stroke="#d3dde4" />
    <text class="label" x="90" y="48" text-anchor="middle">Safety</text>
    <text class="small" x="90" y="76" text-anchor="middle">overlay + guardrails</text>
  </g>

  <g transform="translate(950 90)">
    <rect width="180" height="110" rx="14" fill="#ffffff" stroke="#d3dde4" />
    <text class="label" x="90" y="48" text-anchor="middle">Report</text>
    <text class="small" x="90" y="76" text-anchor="middle">HTML + JSON outputs</text>
  </g>

  <line x1="250" y1="145" x2="290" y2="145" stroke="#0f7c88" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="470" y1="145" x2="510" y2="145" stroke="#0f7c88" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="690" y1="145" x2="730" y2="145" stroke="#0f7c88" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="910" y1="145" x2="950" y2="145" stroke="#0f7c88" stroke-width="4" marker-end="url(#arrow)" />
</svg>
